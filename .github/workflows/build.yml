name: Build resume

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Typst
        run: pip install typst

      - name: Build PDF
        run: python build.py

      - uses: actions/upload-artifact@v4
        with:
          name: Badam_Resume
          path: out/Badam_Resume.pdf

      - name: Attach PDF to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/Badam_Resume.pdf
