projects:
  - name: LLM Evaluation Platform
    stack: [React, TypeScript, Python, Turi Bolt, TensorRT, Celery, S3]
    org: Apple
    description:
      End-to-end internal platform for evaluating generative language models and understanding
      the datasets behind them. The benchmarking layer orchestrates distributed inference jobs,
      compares outputs against ground truth, and surfaces results through interactive dashboards.
      The data valuation layer generates diversity and quality signals for training datasets,
      identifying gaps to improve models.
    contributions:
      Tech lead for a group of four engineers. Defined the technical vision and coordinated
      cross-org partners. Led frontend and visualization work, built the data valuation pipelines
      over training datasets, and contributed to the backend. Promoted adoption across the AI/ML
      org and coached early users on diagnosing failures and tuning their models.
  - name: Metrics Platform
    stack: [React, VisX, Python, Spark, Airflow, Druid, Trino]
    org: Apple
    description:
      Provides the top usage, engagement, performance, and user experience metrics for Siri and
      Spotlight, built for monitoring and easy exploration of metrics across 10+ key dimensions.
    contributions:
      Backend development including Spark jobs for metrics creation. Front-end and visualization
      development for an intuitive user experience. Infrastructure to fetch and serve metrics
      across 10+ million dimension combinations using a caching service and Druid.
  - name: Failure Analysis Platform
    stack: [React, D3, Trino, Postgres]
    org: Apple
    description:
      Data analysis platform in the AI/ML org used to triage failures and prioritize improvements.
      Uses annotation and collaboration techniques so teams of engineers can identify failure
      behaviors from individual data points.
    contributions:
      Requirements collection from user interviews, key design decisions, front-end and
      visualization components, and back-end APIs.
  - name: Vistrates
    stack: [D3, Vega, JavaScript, Node, MongoDB]
    org: University of Maryland
    description:
      A platform for data science that helps data scientists create analytical components in a
      flexible user interface that transforms into a notebook for development, a dashboard for
      exploration, and a slideshow for presentation (publication P6).
  - name: TimeFork
    stack: [JavaScript, D3, TensorFlow, Python]
    org: University of Maryland
    description:
      Research tool for interactive prediction of time-series data. Uses ML models to generate
      multiple predictions and help users compare possible futures; evaluated through user
      studies in the stock market domain (publication P1).

